# GapLess プロジェクト Dart 解析設定
analyzer:
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - 'build/**'
    # scripts/ は開発支援スクリプトのため解析対象外
    - 'scripts/**'
    # 自動生成テスト
    - 'test/**'
  errors:
    deprecated_member_use: ignore

linter:
  rules:
    # scriptsディレクトリのprintは想定内のため無効化
    avoid_print: false
    prefer_single_quotes: false
