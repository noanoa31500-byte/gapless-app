name: safe_japan
version: 5.0.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter: { sdk: flutter }
  flutter_map: any
  flutter_map_cancellable_tile_provider: ^2.0.0
  flutter_map_marker_cluster: ^1.3.6
  latlong2: any
  provider: any
  geolocator: any
  flutter_compass: any
  shared_preferences: any
  flutter_tts: any
  vibration: any
  intl: any
  animate_do: any
  url_launcher: any
  connectivity_plus: any
  http: any
  web: any
  csv: ^6.0.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
#  google_fonts: ^8.0.0 # Removed to rely on local assets for offline safety

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
        - asset: assets/fonts/NotoSansJP-Bold.ttf
          weight: 700
    - family: NotoSansThai
      fonts:
        - asset: assets/fonts/NotoSansThai-Regular.ttf
        - asset: assets/fonts/NotoSansThai-Bold.ttf
          weight: 700
